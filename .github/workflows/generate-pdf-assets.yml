name: Generate PDF Assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "input/fsh/**"
      - "scripts/generate_ccss_lab_pdfs.py"
      - "input/pagecontent/revision-semantica.md"
      - ".github/workflows/generate-pdf-assets.yml"

permissions:
  contents: write

jobs:
  generate-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab

      - name: Generate PDF assets
        run: |
          python3 scripts/generate_ccss_lab_pdfs.py

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- generated/pdf-lab-reports-ccss; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git add generated/pdf-lab-reports-ccss
          git commit -m "chore(ci): update generated PDF assets"
          git push
